<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CalmHz</title>

<style>
body{
margin:0;
font-family:system-ui;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
direction:rtl;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
filter:blur(6px) brightness(.5);
transition:1s;
}

.app{
position:relative;
z-index:2;
width:420px;
background:rgba(17,24,39,.75);
backdrop-filter: blur(12px);
border-radius:18px;
padding:18px;
box-shadow:0 30px 80px rgba(0,0,0,.7);
}

h2{margin:0 0 10px}

.card{margin-top:14px}

input[type=range]{
width:100%;
}

.row{
display:flex;
gap:8px;
margin-top:14px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:600;
}

.stop{background:#dc2626}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="app">

<h2>CalmHz</h2>

<div class="card">
🌧 גשם
<input id="rain" type="range" min="0" max="100" value="0">
</div>

<div class="card">
🌊 ים
<input id="ocean" type="range" min="0" max="100" value="0">
</div>

<div class="card">
🌲 יער
<input id="forest" type="range" min="0" max="100" value="0">
</div>

<div class="card">
🌬 רוח
<input id="wind" type="range" min="0" max="100" value="0">
</div>

<div class="row">
<button onclick="play()">נגן</button>
<button class="stop" onclick="stop()">עצור</button>
</div>

</div>

<script>

let sounds={}

function load(name,url){
sounds[name]=new Audio(url)
sounds[name].loop=true
}

load("rain","https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3")
load("ocean","https://cdn.pixabay.com/download/audio/2022/03/10/audio_5c3f4c4d6c.mp3")
load("forest","https://cdn.pixabay.com/download/audio/2022/10/16/audio_9f2f1b3e.mp3")
load("wind","https://cdn.pixabay.com/download/audio/2021/09/06/audio_4b2d.mp3")

function setBackground(){

if(rain.value>0)
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1501696461415-6bd6660c6742?q=80&w=1600')"

else if(ocean.value>0)
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600')"

else if(forest.value>0)
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1600')"

else if(wind.value>0)
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1600')"

}

function play(){

stop()

Object.keys(sounds).forEach(name=>{
sounds[name].volume=document.getElementById(name).value/100
if(sounds[name].volume>0) sounds[name].play()
})

setBackground()
}

function stop(){
Object.values(sounds).forEach(a=>{
a.pause()
a.currentTime=0
})
}

</script>

</body>
</html>
