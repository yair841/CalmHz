<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CalmHz Studio</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
direction:rtl;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
filter:blur(8px) brightness(.4);
transition:1s;
}

.app{
position:relative;
z-index:2;
width:460px;
background:rgba(17,24,39,.75);
backdrop-filter: blur(12px);
border-radius:20px;
padding:20px;
box-shadow:0 30px 80px rgba(0,0,0,.7);
}

h2{
margin:0 0 10px;
}

.card{
margin-top:12px;
}

select,input{
width:100%;
}

.row{
display:flex;
gap:8px;
margin-top:12px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:#22c55e;
color:white;
}

.stop{background:#ef4444}
.youtube{background:#3b82f6}

iframe{
width:100%;
height:180px;
border-radius:12px;
border:none;
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="app">

<h2>CalmHz Studio</h2>

<div class="card">
סוג צליל
<select id="type">
<option value="sine">תדר סינוס</option>
<option value="white">רעש לבן</option>
<option value="pink">רעש ורוד</option>
<option value="brown">רעש חום</option>
</select>
</div>

<div class="card">
תדר: <span id="freqVal">440Hz</span>
<input id="freq" type="range" min="20" max="20000" value="440">
</div>

<div class="card">
רקע
<select onchange="setBg(this.value)">
<option value="rain">גשם</option>
<option value="ocean">ים</option>
<option value="forest">יער</option>
<option value="night">לילה</option>
</select>
</div>

<div class="card">
מצבים מוכנים
<select onchange="preset(this.value)">
<option>בחר</option>
<option value="focus">Focus</option>
<option value="sleep">Sleep</option>
<option value="rain">Rain</option>
<option value="deep">Deep Noise</option>
</select>
</div>

<div class="row">
<button onclick="play()">נגן</button>
<button class="stop" onclick="stop()">עצור</button>
<button class="youtube" onclick="toggleYT()">YouTube</button>
</div>

<iframe id="yt"
src="https://www.youtube.com/embed/5qap5aO4i9A"
allow="autoplay">
</iframe>

</div>

<script>
let ctx,source;

freq.oninput=()=>{
freqVal.innerText=freq.value+"Hz";
}

function setBg(v){
const bg=document.getElementById("bg");

if(v==="rain")
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1501696461415-6bd6660c6742')";

if(v==="ocean")
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')";

if(v==="forest")
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e')";

if(v==="night")
bg.style.backgroundImage="url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')";
}

function noise(type,len){
const buffer=ctx.createBuffer(1,len,ctx.sampleRate);
const data=buffer.getChannelData(0);

let last=0;

for(let i=0;i<data.length;i++){

let white=Math.random()*2-1;

if(type==="white") data[i]=white;

if(type==="pink"){
data[i]=(white+last)/2;
last=data[i];
}

if(type==="brown"){
last=(last+(0.02*white))/1.02;
data[i]=last;
}

}

return buffer;
}

function play(){

stop();

ctx=new AudioContext();

const type=document.getElementById("type").value;

if(type==="sine"){
source=ctx.createOscillator();
source.frequency.value=freq.value;
source.connect(ctx.destination);
source.start();
return;
}

const buffer=noise(type,ctx.sampleRate*5);

source=ctx.createBufferSource();
source.buffer=buffer;
source.loop=true;
source.connect(ctx.destination);
source.start();
}

function stop(){
try{source.stop()}catch{}
}

function preset(p){

if(p==="focus"){
type.value="sine";
freq.value=432;
}

if(p==="sleep"){
type.value="brown";
}

if(p==="rain"){
type.value="pink";
}

if(p==="deep"){
type.value="white";
freq.value=120;
}

freq.oninput();
}

function toggleYT(){
const y=document.getElementById("yt");
y.style.display=y.style.display==="none"?"block":"none";
}
</script>

</body>
</html>
