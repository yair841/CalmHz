<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SottoDreams | Pure Sleep Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e7dff;
            --bg: #03050a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* תפריט צד - רשימת סרטונים */
        .sidebar {
            width: 380px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-weight: 200;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            color: var(--primary);
        }

        .video-thumb {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .video-thumb:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.02);
        }

        .video-thumb img {
            width: 100px;
            border-radius: 10px;
        }

        .video-thumb span {
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* אזור ראשי */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, #111420 0%, #03050a 100%);
        }

        .player-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .iframe-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* אזור עצות וכלים */
        .bottom-shelf {
            height: 200px;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .tip-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tip-box h4 { margin: 0 0 10px 0; color: var(--primary); }

        .breathe-tool {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dot {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 4s infinite ease-in-out;
            box-shadow: 0 0 20px var(--primary);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.8); opacity: 1; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>SottoDreams</h2>
        
        <div class="video-thumb" onclick="playVid('V7dYzufRpJA')">
            <img src="https://img.youtube.com/vi/V7dYzufRpJA/mqdefault.jpg">
            <span>פסנתר מרגיע לבוקר</span>
        </div>

        <div class="video-thumb" onclick="playVid('cTVzFYEaidU')">
            <img src="https://img.youtube.com/vi/cTVzFYEaidU/mqdefault.jpg">
            <span>פסנתר וגשם עדין</span>
        </div>

        <div class="video-thumb" onclick="playVid('R7Ywx3ZWLyY')">
            <img src="https://img.youtube.com/vi/R7Ywx3ZWLyY/mqdefault.jpg">
            <span>צלילי מים עמוקים</span>
        </div>

        <div class="video-thumb" onclick="playVid('8eER1PAt23c')">
            <img src="https://img.youtube.com/vi/8eER1PAt23c/mqdefault.jpg">
            <span>מנגינת שלווה לשינה</span>
        </div>

        <div class="video-thumb" onclick="playVid('zJtJXMg3XBk')">
            <img src="https://img.youtube.com/vi/zJtJXMg3XBk/mqdefault.jpg">
            <span>פסנתר חלומי ללילה</span>
        </div>

        <div class="video-thumb" onclick="playVid('_v0L-WbuJoE')">
            <img src="https://img.youtube.com/vi/_v0L-WbuJoE/mqdefault.jpg">
            <span>רעש חום (Brown Noise)</span>
        </div>
    </aside>

    <main class="main-stage">
        <div class="player-wrapper">
            <div class="iframe-container">
                <iframe id="main-player" width="100%" height="100%" 
                    src="https://www.youtube.com/embed/V7dYzufRpJA?enablejsapi=1&autoplay=1" 
                    frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="bottom-shelf">
            <div class="tip-box">
                <h4>טיפ לשינה איכותית</h4>
                <p id="tip-text">הידעת? חשיפה לאור יום בשעות הבוקר המוקדמות עוזרת לווסת את השעון הביולוגי לשינה טובה יותר בלילה.</p>
            </div>
            <div class="breathe-tool">
                <div class="dot"></div>
                <span style="margin-top: 10px; font-size: 0.8rem;">נשימה מודעת</span>
            </div>
        </div>
    </main>

    <script>
        // פונקציה להחלפת סרטון
        function playVid(id) {
            document.getElementById('main-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        }

        // מערכת עצות מתחלפת
        const tips = [
            "הימנעו מצריכת קפאין לפחות 6 שעות לפני השינה.",
            "נסו לשמור על טמפרטורה של 18-22 מעלות בחדר השינה.",
            "שגרת 'ניתוק' ממסכים כ-30 דקות לפני השינה משפרת את איכות ה-REM.",
            "כתיבת 'רשימת דאגות' לפני השינה עוזרת לנקות את המחשבות.",
            "רעש חום (Brown Noise) הוכח כיעיל במיוחד להרגעת מחשבות רצות."
        ];

        let tipIndex = 0;
        setInterval(() => {
            tipIndex = (tipIndex + 1) % tips.length;
            document.getElementById('tip-text').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('tip-text').innerText = tips[tipIndex];
                document.getElementById('tip-text').style.opacity = 1;
            }, 500);
        }, 8000);
    </script>
</body>
</html>
