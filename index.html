<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SottoDreams | חוויית שינה מודרנית</title>
    <style>
        :root {
            --primary: #a29bfe;
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(125, 95, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(162, 155, 254, 0.05) 0%, transparent 40%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            backdrop-filter: blur(10px);
            background: var(--glass);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary);
        }

        /* Hero Section */
        .hero {
            padding: 80px 5%;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Video Grid - התפריט של הסרטונים */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px 5%;
        }

        .video-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-card iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        .video-info {
            padding: 15px;
        }

        .video-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #ddd;
        }

        /* Tools Section */
        .tools-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 40px 5%;
            justify-content: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 350px;
            text-align: center;
        }

        /* Breathing Animation */
        .breathe-widget {
            width: 120px;
            height: 120px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .breathe-circle {
            width: 100%;
            height: 100%;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.4;
            animation: breathe-alt 8s infinite ease-in-out;
        }

        @keyframes breathe-alt {
            0%, 100% { transform: scale(0.5); opacity: 0.2; }
            50% { transform: scale(1); opacity: 0.6; }
        }

        .timer-val {
            font-size: 3rem;
            font-weight: 200;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--primary);
        }

        footer {
            padding: 60px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            margin-top: 50px;
            color: #666;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">SottoDreams</div>
    <div>
        <span id="clock" style="font-family: monospace; font-size: 1.2rem;"></span>
    </div>
</nav>

<section class="hero">
    <h1>לילה טוב מתחיל כאן</h1>
    <p>אוסף הסרטונים והכלים לשינה מושלמת</p>
</section>

<div class="video-grid">
    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/videoseries?list=PLux_S_9_G02Is_Wd7q1MshvXvN-iZ2-nO"></iframe>
        <div class="video-info">
            <h3>אוסף הירדמות מהירה</h3>
        </div>
    </div>

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/k9HeXm_6mC8"></iframe>
        <div class="video-info">
            <h3>צלילי גשם עמוקים</h3>
        </div>
    </div>

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/RAt7Zk8n4L8"></iframe>
        <div class="video-info">
            <h3>מוזיקה לשינה עמוקה</h3>
        </div>
    </div>
    
    </div>

<div class="tools-container">
    <div class="glass-card">
        <h3>טיימר שינה</h3>
        <div class="timer-val" id="timerDisplay">20:00</div>
        <button class="btn" onclick="toggleTimer()">התחל טיימר</button>
    </div>

    <div class="glass-card">
        <h3>איזון נשימה</h3>
        <div class="breathe-widget">
            <div class="breathe-circle"></div>
        </div>
        <p>שאפו... נשפו...</p>
    </div>
</div>

<footer>
    <p>כל הזכויות שמורות ל-SottoDreams | עוצב עבור שינה טובה יותר</p>
</footer>

<script>
    // שעון בזמן אמת בנאב-באר
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    // טיימר שינה משופר
    let timerInterval;
    let seconds = 1200;
    function toggleTimer() {
        if(timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            return;
        }
        timerInterval = setInterval(() => {
            seconds--;
            let m = Math.floor(seconds/60);
            let s = seconds % 60;
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(seconds <= 0) clearInterval(timerInterval);
        }, 1000);
    }
</script>

</body>
</html>
