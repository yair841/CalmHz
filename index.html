<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SottoDreams Premium | Zen Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c299ff;
            --bg-dark: #020408;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.08);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg-dark);
            color: white;
            font-family: 'Heebo', sans-serif;
            overflow: hidden; /* מבנה אפליקטיבי */
        }

        /* כוכבים זזים ברקע */
        #stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0f1d 0%, #020408 100%);
        }

        /* ממשק משתמש שכבות */
        .app-wrapper {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
        }

        /* תפריט סרטונים צדדי */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            overflow-y: auto;
            transition: var(--transition);
        }

        .video-item {
            background: var(--glass-strong);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .video-item:hover {
            border-color: var(--primary);
            background: rgba(194, 153, 255, 0.1);
        }

        .video-item img {
            width: 100%;
            border-radius: 10px;
        }

        /* אזור הנגן המרכזי */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .player-container {
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-strong);
        }

        /* פאנל שליטה תחתון */
        .control-panel {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 15px 40px;
            border-radius: 50px;
            border: 1px solid var(--glass-strong);
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
            transition: 0.3s;
        }

        .control-btn:hover { opacity: 1; color: var(--primary); }

        /* בועת נשימה מרחפת */
        .breathing-anchor {
            position: absolute;
            top: 40px;
            left: 40px;
            text-align: center;
        }

        .mini-breathe {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(10px);
            animation: breathe-slow 6s infinite ease-in-out;
        }

        @keyframes breathe-slow {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        /* מצב פוקוס */
        .focus-mode .sidebar, .focus-mode .breathing-anchor {
            transform: translateX(100%);
            opacity: 0;
        }
    </style>
</head>
<body>

<div id="stars-container"></div>

<div class="app-wrapper" id="appBody">
    <aside class="sidebar">
        <h2 style="font-weight: 100; letter-spacing: 2px;">SottoDreams</h2>
        <p style="font-size: 12px; color: var(--primary);">בחר סרטון להירדמות:</p>
        
        <div class="video-item" onclick="changeVideo('k9HeXm_6mC8')">
            <img src="https://img.youtube.com/vi/k9HeXm_6mC8/mqdefault.jpg" alt="Rain">
            <p>צלילי גשם ליליים</p>
        </div>

        <div class="video-item" onclick="changeVideo('RAt7Zk8n4L8')">
            <img src="https://img.youtube.com/vi/RAt7Zk8n4L8/mqdefault.jpg" alt="Deep Sleep">
            <p>מוזיקה לתת-מודע</p>
        </div>

        <div class="video-item" onclick="changeVideo('videoseries?list=PLux_S_9_G02Is_Wd7q1MshvXvN-iZ2-nO')">
            <img src="https://img.youtube.com/vi/SottoDreams/mqdefault.jpg" alt="Playlist">
            <p>כל הסרטונים - רצף</p>
        </div>
    </aside>

    <main class="main-content">
        <div class="breathing-anchor">
            <div class="mini-breathe"></div>
            <span style="font-size: 10px; display: block; margin-top: 10px;">נשום איתי</span>
        </div>

        <div class="player-container">
            <iframe id="mainPlayer" width="100%" height="100%" 
                src="https://www.youtube.com/embed/k9HeXm_6mC8?enablejsapi=1&autoplay=1&mute=0" 
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>
        </div>

        <div class="control-panel">
            <button class="control-btn" onclick="toggleFocus()">
                <span>🔲</span>
                <span>פוקוס</span>
            </button>
            <button class="control-btn" onclick="setTimer(20)">
                <span>⏳</span>
                <span>20 דק'</span>
            </button>
            <button class="control-btn" onclick="alert('הפעלת רעש לבן (גשם) ברקע...')">
                <span>🌧️</span>
                <span>סאונד רקע</span>
            </button>
        </div>
    </main>
</div>

<script>
    // שינוי וידאו ללא ריענון דף
    function changeVideo(id) {
        const player = document.getElementById('mainPlayer');
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
    }

    // מצב פוקוס
    function toggleFocus() {
        document.body.classList.toggle('focus-mode');
    }

    // יצירת כוכבים דינמיים
    const container = document.getElementById('stars-container');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.style.position = 'absolute';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 3 + 'px';
        star.style.height = star.style.width;
        star.style.background = 'white';
        star.style.borderRadius = '50%';
        star.style.opacity = Math.random();
        star.style.filter = 'blur(1px)';
        container.appendChild(star);
    }

    // טיימר פשוט
    function setTimer(mins) {
        alert(`הטיימר הוגדר ל-${mins} דקות. לילה טוב!`);
        setTimeout(() => {
            document.getElementById('mainPlayer').src = "";
        }, mins * 60000);
    }
</script>

</body>
</html>
