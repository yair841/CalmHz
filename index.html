<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SottoDreams Ultra AI</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">

<style>
:root{
--p:#8e7dff;
--bg:#05070d;
--card:rgba(255,255,255,.05);
--border:rgba(255,255,255,.1);
--txt:#eaeaea;
}

body{
margin:0;
font-family:Assistant;
background:var(--bg);
color:var(--txt);
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:320px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(20px);
padding:12px;
overflow:auto;
border-left:1px solid var(--border);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
margin:6px 0;
background:var(--card);
border-radius:12px;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.player{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.frame{
width:92%;
max-width:900px;
aspect-ratio:16/9;
border-radius:18px;
overflow:hidden;
border:1px solid var(--border);
}

.controls{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
padding:10px;
}

button{
border:1px solid var(--border);
background:var(--card);
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* BOTTOM */
.bottom{
display:grid;
grid-template-columns:1fr 1fr;
height:180px;
gap:10px;
padding:10px;
}

.box{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:10px;
}

/* BREATH */
.circle{
width:90px;
height:90px;
border-radius:50%;
border:3px solid var(--p);
margin:auto;
box-shadow:0 0 20px var(--p);
transition:all 4s ease;
}

/* AI */
#aiPanel{
position:fixed;
left:15px;
bottom:15px;
width:320px;
height:420px;
background:#111;
border:1px solid #333;
border-radius:16px;
display:none;
flex-direction:column;
overflow:hidden;
z-index:999;
}

#chat{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

.msg{
margin:6px 0;
padding:8px;
border-radius:10px;
}

.user{background:#222;}
.ai{background:#1a1a2a;}

</style>
</head>

<body>

<aside class="sidebar" id="list"></aside>

<main class="main">

<div class="player">
<div class="frame">
<iframe id="player" width="100%" height="100%"
src="https://www.youtube.com/embed/l9Se0S7BjgM?autoplay=1"
allow="autoplay"></iframe>
</div>
</div>

<div class="controls">
<button onclick="shuffle()">🎲</button>
<button onclick="toggleBreath()">🫁</button>
<button onclick="togglePomodoro()">🍅</button>
<button onclick="sleepTimer(10)">🌙</button>
<button onclick="fs()">⛶</button>
<button onclick="toggleAI()">🤖 AI</button>
</div>

<div class="bottom">

<div class="box">
<div id="mode">מצב: רגיל</div>
<div id="timer"></div>
</div>

<div class="box">
<div class="circle" id="circle"></div>
</div>

</div>

</main>

<!-- AI PANEL -->
<div id="aiPanel">
<div style="padding:10px;border-bottom:1px solid #333;">🤖 SottoAI</div>
<div id="chat"></div>
<div style="display:flex;border-top:1px solid #333;">
<input id="msg" style="flex:1;padding:10px;background:#000;color:#fff;border:none;outline:none">
<button onclick="sendAI()">➤</button>
</div>
</div>

<script>

const videos=["l9Se0S7BjgM","1QpwMjeaCFo","EhYArG82mlU","WkC4vmK1RKc"];

let fav=JSON.parse(localStorage.getItem("fav")||"[]");

const list=document.getElementById("list");

function render(){
list.innerHTML="";
videos.forEach(v=>{
const el=document.createElement("div");
el.className="item";
el.innerHTML=`
<span onclick="play('${v}')">${v}</span>
<span onclick="favToggle('${v}')">${fav.includes(v)?"⭐":"☆"}</span>
`;
list.appendChild(el);
});
}
render();

function play(id){
document.getElementById("player").src=
`https://www.youtube.com/embed/${id}?autoplay=1`;
}

function shuffle(){
play(videos[Math.floor(Math.random()*videos.length)]);
}

function favToggle(id){
fav.includes(id)?fav=fav.filter(x=>x!=id):fav.push(id);
localStorage.setItem("fav",JSON.stringify(fav));
render();
}

/* FULLSCREEN */
function fs(){
document.documentElement.requestFullscreen();
}

/* BREATH */
let breathing=false;
let scale=1;
function toggleBreath(){
breathing=!breathing;
animate();
}

function animate(){
if(!breathing)return;

scale = scale===1?1.6:1;
document.getElementById("circle").style.transform=`scale(${scale})`;

setTimeout(animate,4000);
}

/* POMODORO */
let pom=false,time=1500,work=true;

function togglePomodoro(){
pom=!pom;
runPom();
}

function runPom(){
if(!pom)return;

setInterval(()=>{
time--;

document.getElementById("timer").innerText=
(work?"עבודה ":"הפסקה ")+Math.floor(time/60)+":"+String(time%60).padStart(2,"0");

if(time<=0){
work=!work;
time=work?1500:300;
}
},1000);
}

/* SLEEP */
function sleepTimer(min){
let s=min*60;

let t=setInterval(()=>{
s--;
document.getElementById("timer").innerText=
"נותר: "+Math.floor(s/60)+":"+String(s%60).padStart(2,"0");

if(s<=0){
clearInterval(t);
play("");
}
},1000);
}

/* AI */
function toggleAI(){
const p=document.getElementById("aiPanel");
p.style.display = p.style.display==="flex"?"none":"flex";
}

function addMsg(t,c){
const d=document.createElement("div");
d.className="msg "+t;
d.innerText=c;
document.getElementById("chat").appendChild(d);
}

function sendAI(){
const i=document.getElementById("msg");
const v=i.value;
if(!v)return;

addMsg("user",v);
i.value="";

setTimeout(()=>{
addMsg("ai",fakeAI(v));
},500);
}

function fakeAI(t){
t=t.toLowerCase();

if(t.includes("שינה")) return "💤 נסה נשימה איטית וכיבוי מסך";
if(t.includes("פוקוס")) return "🎯 25 דקות עבודה בלי הפרעות";
if(t.includes("לחץ")) return "🫁 נשימה עמוקה 4-7-8";

return "🤖 אני כאן לעזור לך להירגע, להתמקד או לישון טוב יותר";
}

</script>

</body>
</html>
