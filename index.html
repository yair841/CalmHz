<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SottoDreams</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#8e7dff;
--bg:#03050a;
--card:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.08);
--text:#e0e0e0;
}

body{
margin:0;
font-family:'Assistant',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

/* רקע וידאו */
.video-bg{
position:fixed;
inset:0;
z-index:0;
opacity:.45;
filter:blur(45px) brightness(.8);
pointer-events:none;
}

.video-bg iframe{
width:120vw;
height:120vh;
transform:scale(1.3);
}

.bg-ambient{
position:fixed;
inset:0;
z-index:1;
background:
radial-gradient(circle at 20% 30%, rgba(142,125,255,.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,150,255,.1), transparent 40%);
animation:floatBg 20s infinite ease-in-out;
}

@keyframes floatBg{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

.sidebar{
width:360px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(20px);
border-left:1px solid var(--border);
padding:20px;
overflow-y:auto;
z-index:2;
}

.category{
margin-top:20px;
font-size:.8rem;
opacity:.7;
border-bottom:1px solid var(--border);
}

.video-thumb{
display:flex;
gap:10px;
align-items:center;
padding:8px;
border-radius:12px;
background:var(--card);
border:1px solid var(--border);
margin:8px 0;
cursor:pointer;
transition:.2s;
}

.video-thumb:hover{
transform:scale(1.03);
background:rgba(142,125,255,.15);
}

.video-thumb img{
width:90px;
border-radius:8px;
}

.main-stage{
flex:1;
display:flex;
flex-direction:column;
z-index:2;
}

.player-wrapper{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.iframe-container{
width:100%;
max-width:900px;
aspect-ratio:16/9;
border-radius:25px;
overflow:hidden;
border:1px solid var(--border);
box-shadow:0 40px 100px rgba(0,0,0,.8);
}

.controls{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
padding:10px;
}

.btn{
padding:7px 12px;
border-radius:20px;
border:1px solid var(--border);
background:var(--card);
color:white;
cursor:pointer;
}

.bottom-shelf{
height:160px;
padding:20px;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.tip-box,.breathe-tool{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:15px;
}

.breathe-tool{
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.dot{
width:40px;
height:40px;
background:var(--primary);
border-radius:50%;
box-shadow:0 0 20px var(--primary);
}
</style>
</head>

<body>

<div class="video-bg">
<iframe id="bg-video"
src="https://www.youtube.com/embed/l9Se0S7BjgM?autoplay=1&mute=1&loop=1&controls=0&playlist=l9Se0S7BjgM">
</iframe>
</div>

<div class="bg-ambient"></div>

<aside class="sidebar">
<h2>SottoDreams</h2>
<div id="video-list"></div>
</aside>

<main class="main-stage">

<div class="player-wrapper">
<div class="iframe-container">
<iframe id="main-player"
width="100%" height="100%"
src="https://www.youtube.com/embed/l9Se0S7BjgM?autoplay=1"
frameborder="0" allow="autoplay" allowfullscreen>
</iframe>
</div>
</div>

<div class="controls">
<button class="btn" onclick="shuffle()">Shuffle</button>
<button class="btn" onclick="nextVideo()">Next</button>
<button class="btn" onclick="startBreathing()">נשימה</button>
<button class="btn" onclick="stopBreathing()">עצור נשימה</button>
<button class="btn" onclick="timer(30)">Sleep 30m</button>
</div>

<div class="bottom-shelf">

<div class="tip-box">
<h4>טיפ</h4>
<p id="tip-text">נשימות איטיות מורידות דופק</p>
</div>

<div class="breathe-tool">
<div class="dot"></div>
<div id="breathText"></div>
</div>

</div>

</main>

<script>

const categories={
"פסנתר":[
"l9Se0S7BjgM",
"1QpwMjeaCFo",
"kFdvhvWnbiY",
"XLRtDXVKOzg"
],
"גשם":[
"EhYArG82mlU",
"powjgBVk7vs",
"VpczuXPGo3Q"
],
"אמביינט":[
"Ia8agGvuCbM",
"IsnqmprRJdM",
"ZW0pfth2hwI"
],
"מים":[
"msYO9MVGwYs",
"WkC4vmK1RKc",
"97JGA1XPuyo",
"hxgwn1HH5vg",
"o6C-KhiAn84"
]
};

let videos=[];
Object.values(categories).forEach(a=>videos.push(...a));

const list=document.getElementById("video-list");

Object.entries(categories).forEach(([cat,arr])=>{
const title=document.createElement("div");
title.className="category";
title.innerText=cat;
list.appendChild(title);

arr.forEach(id=>{
const el=document.createElement("div");
el.className="video-thumb";
el.innerHTML=`
<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
<span>${id}</span>
`;
el.onclick=()=>playVid(id);
list.appendChild(el);
});
});

function playVid(id){
document.getElementById("main-player").src=
`https://www.youtube.com/embed/${id}?autoplay=1`;

document.getElementById("bg-video").src=
`https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&controls=0&playlist=${id}`;
}

function shuffle(){
const r=videos[Math.floor(Math.random()*videos.length)];
playVid(r);
}

function nextVideo(){shuffle()}

function timer(min){
setTimeout(()=>{
document.getElementById("main-player").src="";
},min*60000);
}

/* breathing */
let breathing=false;
let phase=0;

const phases=[
{t:4,text:"שאיפה"},
{t:7,text:"החזק"},
{t:8,text:"נשיפה"}
];

function startBreathing(){
breathing=true;
runBreathing();
}

function stopBreathing(){
breathing=false;
document.getElementById("breathText").innerText="";
}

function runBreathing(){
if(!breathing)return;

const p=phases[phase];
const dot=document.querySelector(".dot");
const text=document.getElementById("breathText");

text.innerText=p.text+" "+p.t;

dot.style.transition=p.t+"s";

if(phase===0) dot.style.transform="scale(1.8)";
if(phase===2) dot.style.transform="scale(1)";

let time=p.t;

const i=setInterval(()=>{
time--;
text.innerText=p.text+" "+time;

if(time<=0){
clearInterval(i);
phase=(phase+1)%phases.length;
runBreathing();
}
},1000);
}

</script>

</body>
</html>
